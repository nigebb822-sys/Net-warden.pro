name: Build APK
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python_version: '3.8'
      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.33 kivy requests kivymd
      - name: Build APK
        run: |
          yes | buildozer init
          # እዚህ ጋር አፑን እንዲሰራ ያደርገዋል
          buildozer -v android debug

