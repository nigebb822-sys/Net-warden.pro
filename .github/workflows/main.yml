name: Build APK
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.33 kivy requests kivymd
      - name: Build with Buildozer
        run: |
          yes | buildozer init
          # የአፑን ስም እዚህ ጋር ያስተካክላል
          sed -i 's/package.name = myapp/package.name = netwarden/' buildozer.spec
          sed -i 's/package.domain = org.test/package.domain = com.nbblackking/' buildozer.spec
          buildozer -v android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NetWarden-APK
          path: bin/*.apk


