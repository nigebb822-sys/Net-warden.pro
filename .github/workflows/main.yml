name: Build APK
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Android SDK and Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk aidl python3-pip
          pip install --user --upgrade buildozer cython==0.29.33 kivy requests kivymd
      - name: Build with Buildozer
        run: |
          yes | buildozer init
          # እዚህ ጋር አፑን እንዲሰራ ያደርገዋል
          buildozer -v android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NetWarden-APK
          path: bin/*.apk

